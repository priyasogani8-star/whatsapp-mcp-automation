<svg width="700" height="450" xmlns="http://www.w3.org/2000/svg">
  <!-- Define arrow markers -->
  <defs>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#059669"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#f97316"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#1f2937">
    Multiple-Choice Poll (Pick 1-3)
  </text>

  <!-- Step 1: Create Poll -->
  <rect x="50" y="60" width="140" height="70" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
  <text x="120" y="85" font-size="13" font-weight="bold" text-anchor="middle" fill="#047857">Step 1</text>
  <text x="120" y="102" font-size="11" text-anchor="middle" fill="#047857">Create Poll</text>
  <text x="120" y="117" font-size="10" text-anchor="middle" fill="#64748b">Min: 1, Max: 3</text>
  <text x="120" y="128" font-size="10" text-anchor="middle" fill="#64748b">"Pick Properties"</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="95" x2="245" y2="95" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- Step 2: Show Options -->
  <rect x="245" y="60" width="140" height="70" rx="8" fill="#fef8f0" stroke="#f97316" stroke-width="2"/>
  <text x="315" y="85" font-size="13" font-weight="bold" text-anchor="middle" fill="#b45309">Step 2</text>
  <text x="315" y="102" font-size="11" text-anchor="middle" fill="#b45309">Show Options</text>
  <text x="315" y="117" font-size="10" text-anchor="middle" fill="#64748b">1BHK • 2BHK • 3BHK</text>
  <text x="315" y="128" font-size="10" text-anchor="middle" fill="#64748b">4BHK • Villa</text>

  <!-- Arrow 2 -->
  <line x1="385" y1="95" x2="440" y2="95" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- Step 3: User Selects Multiple -->
  <rect x="440" y="60" width="140" height="70" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="510" y="85" font-size="13" font-weight="bold" text-anchor="middle" fill="#0c4a6e">Step 3</text>
  <text x="510" y="102" font-size="11" text-anchor="middle" fill="#0c4a6e">User Picks 1-3</text>
  <text x="510" y="117" font-size="10" text-anchor="middle" fill="#64748b">☑ 1BHK</text>
  <text x="510" y="128" font-size="10" text-anchor="middle" fill="#64748b">☑ 2BHK</text>

  <!-- Title for Vote Change -->
  <rect x="50" y="160" width="530" height="30" rx="5" fill="#f3f4f6" stroke="#6b7280" stroke-width="2"/>
  <text x="315" y="182" font-size="13" font-weight="bold" text-anchor="middle" fill="#374151">
    Vote Change Examples (Add or Remove Selections)
  </text>

  <!-- ===== EXAMPLE 1: Adding a Selection ===== -->
  <rect x="40" y="210" width="210" height="200" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="145" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#16a34a">EXAMPLE 1: Add</text>

  <!-- Before box -->
  <rect x="50" y="245" width="90" height="80" rx="5" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="95" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#854d0e">Before</text>
  <text x="95" y="275" font-size="9" text-anchor="middle" fill="#1f2937">☑ 1BHK</text>
  <text x="95" y="288" font-size="9" text-anchor="middle" fill="#1f2937">☑ 2BHK</text>
  <text x="95" y="301" font-size="9" text-anchor="middle" fill="#64748b">(2 choices)</text>
  <text x="95" y="318" font-size="8" text-anchor="middle" fill="#64748b">Valid ✓</text>

  <!-- Arrow -->
  <line x1="140" y1="285" x2="165" y2="285" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- After box -->
  <rect x="165" y="245" width="85" height="80" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="207" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">After</text>
  <text x="207" y="275" font-size="9" text-anchor="middle" fill="#1f2937">☑ 1BHK</text>
  <text x="207" y="288" font-size="9" text-anchor="middle" fill="#1f2937">☑ 2BHK</text>
  <text x="207" y="301" font-size="9" text-anchor="middle" fill="#1f2937">☑ 3BHK</text>
  <text x="207" y="318" font-size="8" font-weight="bold" text-anchor="middle" fill="#15803d">+1 Added ✓</text>

  <!-- ===== EXAMPLE 2: Removing a Selection ===== -->
  <rect x="270" y="210" width="210" height="200" rx="8" fill="#fef2f2" stroke="#f87171" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="375" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#dc2626">EXAMPLE 2: Remove</text>

  <!-- Before box -->
  <rect x="280" y="245" width="90" height="80" rx="5" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="325" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#854d0e">Before</text>
  <text x="325" y="275" font-size="9" text-anchor="middle" fill="#1f2937">☑ 1BHK</text>
  <text x="325" y="288" font-size="9" text-anchor="middle" fill="#1f2937">☑ 2BHK</text>
  <text x="325" y="301" font-size="9" text-anchor="middle" fill="#1f2937">☑ 3BHK</text>
  <text x="325" y="318" font-size="8" text-anchor="middle" fill="#64748b">(3 choices)</text>

  <!-- Arrow -->
  <line x1="370" y1="285" x2="395" y2="285" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowhead-orange)"/>

  <!-- After box -->
  <rect x="395" y="245" width="85" height="80" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="437" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">After</text>
  <text x="437" y="275" font-size="9" text-anchor="middle" fill="#1f2937">☑ 1BHK</text>
  <text x="437" y="288" font-size="9" text-anchor="middle" fill="#1f2937">☑ 3BHK</text>
  <text x="437" y="301" font-size="9" text-anchor="middle" fill="#64748b">(2 choices)</text>
  <text x="437" y="318" font-size="8" font-weight="bold" text-anchor="middle" fill="#15803d">-1 Removed ✓</text>

  <!-- ===== EXAMPLE 3: Full Replacement ===== -->
  <rect x="500" y="210" width="180" height="200" rx="8" fill="#f0f9ff" stroke="#0284c7" stroke-width="2" stroke-dasharray="5,5"/>
  <text x="590" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#0c4a6e">EXAMPLE 3: Replace</text>

  <!-- Before box -->
  <rect x="510" y="245" width="75" height="80" rx="5" fill="#fef3c7" stroke="#eab308" stroke-width="1"/>
  <text x="547" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#854d0e">Before</text>
  <text x="547" y="275" font-size="9" text-anchor="middle" fill="#1f2937">☑ 1BHK</text>
  <text x="547" y="288" font-size="9" text-anchor="middle" fill="#1f2937">☑ 2BHK</text>
  <text x="547" y="301" font-size="8" text-anchor="middle" fill="#64748b">(2)</text>

  <!-- Arrow -->
  <line x1="585" y1="285" x2="605" y2="285" stroke="#0284c7" stroke-width="2" marker-end="url(#arrowhead-green)"/>

  <!-- After box -->
  <rect x="605" y="245" width="75" height="80" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1"/>
  <text x="642" y="260" font-size="10" font-weight="bold" text-anchor="middle" fill="#15803d">After</text>
  <text x="642" y="275" font-size="9" text-anchor="middle" fill="#1f2937">☑ 3BHK</text>
  <text x="642" y="288" font-size="9" text-anchor="middle" fill="#1f2937">☑ Villa</text>
  <text x="642" y="301" font-size="8" font-weight="bold" text-anchor="middle" fill="#15803d">(2) ✓</text>
</svg>